<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI剧本生成平台</title>
    <style>
        :root {
            --apple-font: "SF Pro Display", "SF Pro Text", -apple-system, sans-serif;
            /* iOS 26 spring: fast attack, slow settle */
            --apple-bezier: cubic-bezier(0.16, 1, 0.3, 1);
            --spring-in:  cubic-bezier(0.34, 1.56, 0.64, 1);
            --spring-out: cubic-bezier(0.25, 1, 0.5, 1);

            --bg-color: #f2f2f7;
            --title-color: rgba(60, 60, 67, 0.5);
            --text-main: #1d1d1f;
            --text-placeholder: rgba(60, 60, 67, 0.35);
            --glass-bg: rgba(255, 255, 255, 0.15);
            --glass-blur: blur(15px) saturate(180%);
            --glass-border: linear-gradient(135deg, rgba(255, 255, 255, 0.8), rgba(255, 255, 255, 0.1));

            /* 1. 仿真羊皮草纸质感 */
            --paper-bg: #f4f1ea;
            --paper-grain: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)' opacity='0.05'/%3E%3C/svg%3E");

            --siri-1: #4285f4;
            --siri-2: #9b72cb;
            --siri-3: #d96a9d;
            --siri-4: #feab3a;

            /* 滚动条与菜单实体色 */
            --scroll-thumb: rgba(0, 0, 0, 0.15);
            --menu-bg: #ffffff;
        }

        body.dark {
            /* 不再是纯黑，改为深幽蓝黑，微微透出液态质感 */
            --bg-color: #0d0d12;
            --title-color: rgba(235, 235, 245, 0.5);
            --text-main: #f0f0f5;
            --text-placeholder: rgba(235, 235, 245, 0.55);
            --glass-bg: rgba(28, 28, 42, 0.28);
            --glass-border: linear-gradient(135deg, rgba(255, 255, 255, 0.15), rgba(255, 255, 255, 0.02));
            --paper-bg: #1c1c22;
            --scroll-thumb: rgba(255, 255, 255, 0.15);
            --menu-bg: #252530;
        }

        body.dark .bg-glow {
            opacity: 0.18;
            background:
                radial-gradient(circle at 15% 25%, rgba(80, 100, 200, 0.25) 0%, transparent 50%),
                radial-gradient(circle at 85% 15%, rgba(160, 80, 180, 0.18) 0%, transparent 50%),
                radial-gradient(circle at 50% 85%, rgba(60, 80, 180, 0.18) 0%, transparent 50%);
        }

        /* --- 2. 完美全圆角胶囊滚动条 --- */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: var(--scroll-thumb);
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: rgba(120, 120, 120, 0.4);
        }

        body {
            font-family: var(--apple-font);
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            background: var(--bg-color);
            color: var(--text-main);
            transition: background 0.8s var(--apple-bezier);
            -webkit-font-smoothing: antialiased;
        }

        .bg-glow {
            position: fixed;
            inset: -20%;
            z-index: -1;
            background:
                radial-gradient(circle at 15% 25%, rgba(195, 228, 255, 0.4) 0%, transparent 50%),
                radial-gradient(circle at 85% 15%, rgba(255, 213, 229, 0.3) 0%, transparent 50%),
                radial-gradient(circle at 50% 85%, rgba(226, 226, 255, 0.3) 0%, transparent 50%);
            filter: blur(100px);
            animation: liquidFlow 30s infinite alternate ease-in-out;
        }

        @keyframes liquidFlow {
            from {
                transform: scale(1);
            }

            to {
                transform: scale(1.1) rotate(3deg);
            }
        }

        .mode-toggle,
        .history-toggle {
            position: fixed;
            width: 44px;
            height: 44px;
            border-radius: 14px;
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            cursor: pointer;
            z-index: 1000;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: all 0.4s var(--apple-bezier);
        }

        .mode-toggle svg,
        .history-toggle svg {
            width: 22px;
            height: 22px;
            fill: var(--text-main);
        }

        body.dark .mode-toggle svg {
            fill: none;
            stroke: var(--text-main);
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        /* 登录按钮：在原夜间模式位置 */
        .login-toggle {
            top: 35px;
            right: 35px;
        }

        /* 夜间模式下移至登录按钮正下方 */
        .mode-toggle {
            top: 91px;
            right: 35px;
        }

        .history-toggle {
            bottom: 35px;
            left: 35px;
        }

        /* 登录按钮共享同一套扁平胶囊样式 */
        .login-toggle {
            position: fixed;
            width: 44px;
            height: 44px;
            border-radius: 14px;
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.40);
            border-bottom-color: rgba(255,255,255,0.10);
            cursor: pointer;
            z-index: 1000;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: all 0.4s var(--apple-bezier);
            box-shadow: inset 0 1px 2px rgba(255,255,255,0.6), 0 4px 16px rgba(0,0,0,0.07);
        }

        .login-toggle svg {
            width: 20px;
            height: 20px;
            fill: var(--text-main);
        }

        body.dark .login-toggle {
            border-color: rgba(255,255,255,0.15);
            border-bottom-color: rgba(255,255,255,0.04);
            box-shadow: inset 0 1px 2px rgba(255,255,255,0.12), 0 4px 16px rgba(0,0,0,0.30);
        }

        .login-toggle:hover, .mode-toggle:hover {
            transform: scale(1.06);
        }

        /* --- 岛屿容器 --- */
        .islands-container {
            position: absolute;
            inset: 0;
            z-index: 10;
            pointer-events: none;
        }

        /* ---- iOS 26 Liquid Glass — Island ---- */
        .island {
            position: absolute;
            top: 50%;
            left: 50%;
            pointer-events: auto;
            transform: translate(var(--tx), var(--ty)) scale(var(--s, 1));

            /* Multi-layer glass: specular film + body tint */
            background:
                linear-gradient(
                    155deg,
                    rgba(255,255,255,0.58) 0%,
                    rgba(255,255,255,0.10) 28%,
                    rgba(255,255,255,0.00) 58%,
                    rgba(210,220,255,0.07) 100%
                ),
                rgba(255,255,255,0.20);

            /* Deep blur + saturate for vivid refraction effect */
            backdrop-filter: blur(44px) saturate(220%) brightness(1.05);
            -webkit-backdrop-filter: blur(44px) saturate(220%) brightness(1.05);

            border-radius: 32px;
            overflow: hidden;

            /* Bright top/left edge = light-facing; dim bottom/right = shadow-facing (thickness illusion) */
            border-top: 1px solid rgba(255,255,255,0.80);
            border-left: 1px solid rgba(255,255,255,0.55);
            border-right: 1px solid rgba(255,255,255,0.20);
            border-bottom: 1px solid rgba(255,255,255,0.15);

            box-shadow:
                /* ambient drop shadow */
                0  4px  8px  rgba(0,0,0,0.04),
                0 14px 36px  rgba(0,0,0,0.08),
                0 28px 64px  rgba(0,0,0,0.04),
                /* water-tension outer ring */
                0  0   0 1px rgba(255,255,255,0.35),
                /* inner top specular */
                inset 0  2px  4px rgba(255,255,255,0.95),
                /* inner bottom dark rim (depth) */
                inset 0 -2px  4px rgba(0,0,0,0.07),
                /* lateral refraction */
                inset  2px 0  3px rgba(255,255,255,0.45),
                inset -2px 0  3px rgba(0,0,0,0.03);

            transition: transform 0.75s var(--spring-out), width 0.75s var(--spring-out), height 0.75s var(--spring-out), border-radius 0.75s var(--spring-out), padding 0.5s var(--spring-out), box-shadow 0.4s ease, opacity 0.4s ease;
            cursor: text;
        }

        /* Curved top-gloss film */
        .island::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 44%;
            border-radius: 32px 32px 80% 80% / 32px 32px 28px 28px;
            background: linear-gradient(
                180deg,
                rgba(255,255,255,0.42) 0%,
                rgba(255,255,255,0.00) 100%
            );
            pointer-events: none;
            z-index: 5;
        }

        body.dark .island {
            background:
                linear-gradient(
                    155deg,
                    rgba(255,255,255,0.22) 0%,
                    rgba(255,255,255,0.03) 38%,
                    rgba(130,150,255,0.05) 100%
                ),
                rgba(36, 36, 52, 0.30);
            backdrop-filter: blur(44px) saturate(180%) brightness(0.92);
            -webkit-backdrop-filter: blur(44px) saturate(180%) brightness(0.92);
            border-top-color:   rgba(255,255,255,0.28);
            border-left-color:  rgba(255,255,255,0.18);
            border-right-color: rgba(255,255,255,0.06);
            border-bottom-color:rgba(255,255,255,0.05);
            box-shadow:
                0  6px 16px  rgba(0,0,0,0.30),
                0 20px 50px  rgba(0,0,0,0.28),
                0 36px 80px  rgba(0,0,0,0.18),
                0  0   0 1px rgba(255,255,255,0.10),
                inset 0  2px  4px rgba(255,255,255,0.22),
                inset 0 -2px  4px rgba(0,0,0,0.45);
        }

        .island-1 {
            --tx: calc(-100% - 70px);
            --ty: calc(-100% - 70px);
            width: 38vw;
            max-width: 440px;
            height: 22vh;
            max-height: 200px;
            padding: 30px 40px;
            box-sizing: border-box;
        }

        .island-2 {
            --tx: 70px;
            --ty: calc(-100% - 70px);
            width: 38vw;
            max-width: 440px;
            height: 22vh;
            max-height: 200px;
            padding: 30px 40px;
            box-sizing: border-box;
        }

        .island-3 {
            --tx: calc(-100% - 70px);
            --ty: 70px;
            width: 38vw;
            max-width: 440px;
            height: 22vh;
            max-height: 200px;
            padding: 30px 40px;
            box-sizing: border-box;
        }

        .island-4 {
            --tx: 70px;
            --ty: 70px;
            width: 38vw;
            max-width: 440px;
            height: 22vh;
            max-height: 200px;
            padding: 30px 40px;
            box-sizing: border-box;
        }

        .island:hover {
            --s: 1.03;
            box-shadow:
                0  6px 14px  rgba(0,0,0,0.06),
                0 20px 50px  rgba(0,0,0,0.10),
                0 38px 80px  rgba(0,0,0,0.05),
                0  0   0 1px rgba(255,255,255,0.50),
                0  0  24px 4px rgba(220,230,255,0.18),
                inset 0  2px  5px rgba(255,255,255,1.0),
                inset 0 -2px  4px rgba(0,0,0,0.09),
                inset  2px 0  3px rgba(255,255,255,0.55),
                inset -2px 0  3px rgba(0,0,0,0.04);
        }

        .island:focus-within {
            --s: 1.05;
            border-top-color: rgba(100,180,255,0.80);
            border-left-color: rgba(100,180,255,0.55);
            z-index: 20;
        }

        body:has(.island:focus-within) .island:not(:focus-within) {
            filter: blur(4px);
            opacity: 0.7;
        }

        body.is-generating .island {
            pointer-events: none;
        }

        body.is-generating .island-1 {
            --tx: calc(-200% - 25px);
            --ty: calc(-50vh + 35px);
            width: 160px;
            height: 46px;
            border-radius: 23px;
            padding: 0 15px;
        }

        body.is-generating .island-2 {
            --tx: calc(-100% - 8px);
            --ty: calc(-50vh + 35px);
            width: 160px;
            height: 46px;
            border-radius: 23px;
            padding: 0 15px;
        }

        body.is-generating .island-3 {
            --tx: 8px;
            --ty: calc(-50vh + 35px);
            width: 160px;
            height: 46px;
            border-radius: 23px;
            padding: 0 15px;
        }

        body.is-generating .island-4 {
            --tx: calc(100% + 25px);
            --ty: calc(-50vh + 35px);
            width: 160px;
            height: 46px;
            border-radius: 23px;
            padding: 0 15px;
        }

        .normal-view {
            display: flex;
            flex-direction: column;
            justify-content: center;
            height: 100%;
            transition: opacity 0.4s ease;
        }

        .pill-view {
            position: absolute;
            inset: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.4s ease;
        }

        .pill-view svg {
            width: 16px;
            height: 16px;
            flex-shrink: 0;
            fill: var(--text-main);
        }

        .pill-text {
            color: var(--text-main);
            font-size: 14px;
            font-weight: 600;
            font-family: var(--apple-font);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 100px;
        }

        body.is-generating .normal-view {
            opacity: 0;
            pointer-events: none;
        }

        body.is-generating .pill-view {
            opacity: 1;
        }

        .label-row {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 12px;
            opacity: 0.8;
            pointer-events: none;
        }

        .label-row label {
            font-size: 15px;
            font-weight: 700;
            color: var(--title-color);
            text-transform: uppercase;
        }

        .label-row svg {
            width: 20px;
            height: 20px;
            fill: var(--title-color);
        }

        input {
            background: transparent;
            border: none;
            font-size: 26px;
            font-weight: 500;
            color: var(--text-main);
            outline: none;
            width: 100%;
            font-family: var(--apple-font);
        }

        input::placeholder {
            color: var(--text-placeholder);
        }

        /* --- 生成容器 --- */
        .siri-sphere-center {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 50;
            width: 140px;
            height: 140px;
            transition: all 0.8s var(--apple-bezier);
        }

        body.is-generating .siri-sphere-center {
            top: calc(50% + 30px);
            width: 88vw;
            max-width: 1100px;
            height: 75vh;
        }

        /* 展开后变为羊皮纸/黑卡纸 */
        body.is-generating .siri-sphere {
            border-radius: 40px;
            cursor: default;
            background-color: var(--paper-bg);
            background-image: var(--paper-grain);
            box-shadow: 0 30px 80px rgba(0, 0, 0, 0.15);
            border-top:    1px solid rgba(0,0,0,0.05);
            border-left:   1px solid rgba(0,0,0,0.05);
            border-right:  1px solid rgba(0,0,0,0.05);
            border-bottom: 1px solid rgba(0,0,0,0.05);
            backdrop-filter: none;
            -webkit-backdrop-filter: none;
        }

        body.is-generating .siri-sphere::before,
        body.is-generating .siri-sphere::after {
            opacity: 0;
        }

        /* ========================================
           真正的 Siri 活物涌动球体
           ======================================== */

        /* 薄玻璃外壳 — 低不透明，让内部彩液完整透出 */
        .siri-sphere {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            position: relative;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: border-radius 0.8s var(--apple-bezier),
                        box-shadow 0.5s ease,
                        backdrop-filter 0.8s ease;
            cursor: pointer;

            /* 极薄的玻璃膜感，让彩色 blob 透出来是主角 */
            background: rgba(255,255,255,0.08);
            backdrop-filter: blur(6px) saturate(160%);
            -webkit-backdrop-filter: blur(6px) saturate(160%);

            border-top:    1.5px solid rgba(255,255,255,0.80);
            border-left:   1px   solid rgba(255,255,255,0.45);
            border-right:  1px   solid rgba(255,255,255,0.15);
            border-bottom: 1px   solid rgba(255,255,255,0.10);

            box-shadow:
                0  6px 20px  rgba(0,0,0,0.08),
                0 18px 50px  rgba(0,0,0,0.08),
                0  0   0 1.5px rgba(255,255,255,0.40),
                inset 0  2px  6px rgba(255,255,255,0.95),
                inset 0 -2px  5px rgba(0,0,0,0.06);
        }

        /* 顶部高光弧 — 凸透镜质感 */
        .siri-sphere::before {
            content: '';
            position: absolute;
            top: 5%; left: 15%;
            width: 70%; height: 28%;
            border-radius: 50%;
            background: radial-gradient(
                ellipse at 50% 5%,
                rgba(255,255,255,0.85) 0%,
                rgba(255,255,255,0.00) 100%
            );
            pointer-events: none;
            z-index: 20;
            filter: blur(2px);
            transition: opacity 0.6s ease;
        }

        /* 底部折射焦散 */
        .siri-sphere::after {
            content: '';
            position: absolute;
            bottom: 8%; left: 25%;
            width: 50%; height: 12%;
            border-radius: 50%;
            background: radial-gradient(
                ellipse,
                rgba(190,220,255,0.28) 0%,
                rgba(255,255,255,0.00) 100%
            );
            pointer-events: none;
            z-index: 20;
            filter: blur(5px);
            transition: opacity 0.6s ease;
        }

        /* Hover：轻微放大 + 高光增强 */
        .siri-sphere:hover {
            transform: scale(1.06);
            box-shadow:
                0  8px 28px  rgba(0,0,0,0.12),
                0 22px 60px  rgba(0,0,0,0.10),
                0  0   0 1.5px rgba(255,255,255,0.60),
                0  0  50px 10px rgba(180,210,255,0.20),
                inset 0  2px  7px rgba(255,255,255,1.0),
                inset 0 -2px  5px rgba(0,0,0,0.08);
        }

        /* Hover 时内部 blob 加速 */
        .siri-sphere:hover .blob-1 { animation-duration: 4s, 5s; }
        .siri-sphere:hover .blob-2 { animation-duration: 5s, 7s; }
        .siri-sphere:hover .blob-3 { animation-duration: 4.5s, 6s; }
        .siri-sphere:hover .blob-4 { animation-duration: 4s, 5s; }

        body.dark .siri-sphere {
            background: rgba(20,20,40,0.15);
            backdrop-filter: blur(6px) saturate(140%);
            -webkit-backdrop-filter: blur(6px) saturate(140%);
            border-top-color:    rgba(255,255,255,0.28);
            border-left-color:   rgba(255,255,255,0.15);
            border-right-color:  rgba(255,255,255,0.05);
            border-bottom-color: rgba(255,255,255,0.04);
            box-shadow:
                0  8px 24px  rgba(0,0,0,0.40),
                0 20px 55px  rgba(0,0,0,0.35),
                0  0   0 1.5px rgba(255,255,255,0.12),
                inset 0  2px  5px rgba(255,255,255,0.22),
                inset 0 -2px  4px rgba(0,0,0,0.50);
        }

        /* ---- 内部活体 blob 系统 ---- */
        /* sphere-shell 作为 blob 容器 */
        .sphere-shell {
            position: absolute;
            inset: 0;
            border-radius: 50%;
            overflow: hidden;
            z-index: 1;
            /* 整体形态按 organicWobble 慢慢变形 */
            animation: organicWobble 12s infinite ease-in-out;
        }

        /* 每个 blob 是一个模糊的彩色有机体 */
        .blob-1, .blob-2, .blob-3, .blob-4 {
            position: absolute;
            border-radius: 50%;
            filter: blur(22px);
            mix-blend-mode: screen;
            will-change: transform, border-radius;
        }

        /* 蓝色主团 */
        .blob-1 {
            width: 80%; height: 80%;
            top: -10%; left: -10%;
            background: radial-gradient(circle at 40% 40%, #4285f4 0%, #5b9cff 40%, transparent 70%);
            opacity: 0.85;
            animation: blobFloat1 8s infinite ease-in-out alternate,
                       blobMorph1 10s infinite ease-in-out;
        }

        /* 紫粉团 */
        .blob-2 {
            width: 70%; height: 70%;
            bottom: -15%; right: -10%;
            background: radial-gradient(circle at 60% 55%, #9b72cb 0%, #d96a9d 50%, transparent 75%);
            opacity: 0.80;
            animation: blobFloat2 9s infinite ease-in-out alternate,
                       blobMorph2 11s infinite ease-in-out;
        }

        /* 琥珀橙微团 */
        .blob-3 {
            width: 55%; height: 55%;
            top: 20%; right: 0%;
            background: radial-gradient(circle at 50% 50%, #feab3a 0%, #ff7eb3 50%, transparent 80%);
            opacity: 0.60;
            animation: blobFloat3 7s infinite ease-in-out alternate,
                       blobMorph3 9s infinite ease-in-out;
        }

        /* 青色小团 — 营造深度 */
        .blob-4 {
            width: 45%; height: 45%;
            bottom: 5%; left: 5%;
            background: radial-gradient(circle at 50% 50%, #34c5ff 0%, #6bb5ff 50%, transparent 80%);
            opacity: 0.50;
            animation: blobFloat4 10s infinite ease-in-out alternate,
                       blobMorph1 13s infinite ease-in-out reverse;
        }

        .sphere-shell,
        .siri-core {
            transition: opacity 0.5s;
        }

        body.is-generating .sphere-shell,
        body.is-generating .siri-core {
            opacity: 0;
        }

        /* siri-core 保留为空 — blob 已接管 */
        .siri-core {
            display: none;
        }

        /* sphere-text 隐藏（去掉"生成"字） */
        .sphere-text {
            display: none;
        }

        /* --- 剧本区 (分层退场) --- */
        .script-content-wrapper {
            position: absolute;
            inset: 0;
            z-index: 10;
            display: flex;
            flex-direction: column;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.6s ease 0.4s;
        }

        body.is-generating .script-content-wrapper {
            opacity: 1;
            pointer-events: auto;
        }

        .script-scroll-area {
            flex: 1;
            padding: 40px 50px 0;
            overflow-y: auto;
        }

        .script-text {
            line-height: 2.2;
            font-size: 21px;
            white-space: pre-wrap;
            color: var(--text-main);
            padding-bottom: 20px;
        }

        .action-bar {
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .action-btn {
            padding: 12px 28px;
            border-radius: 18px;
            border: 1px solid rgba(0, 0, 0, 0.1);
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.4s;
        }

        .btn-cancel {
            background: rgba(255, 59, 48, 0.1);
            color: #ff3b30;
            display: none;
        }

        .btn-return {
            background: rgba(0, 0, 0, 0.05);
            color: var(--text-main);
            display: none;
        }

        /* --- 记忆抽屉：液态玻璃升级 --- */
        .history-drawer {
            position: fixed;
            top: 20px;
            bottom: 20px;
            left: -420px;
            width: 360px;
            /* 多层玻璃背景：顶部高光膜 + 主体 */
            background:
                linear-gradient(
                    160deg,
                    rgba(255,255,255,0.50) 0%,
                    rgba(255,255,255,0.08) 30%,
                    rgba(255,255,255,0.00) 60%
                ),
                rgba(255,255,255,0.22);
            backdrop-filter: blur(50px) saturate(200%) brightness(1.04);
            -webkit-backdrop-filter: blur(50px) saturate(200%) brightness(1.04);
            border-radius: 28px;
            border-top:    1px solid rgba(255,255,255,0.75);
            border-left:   1px solid rgba(255,255,255,0.50);
            border-right:  1px solid rgba(255,255,255,0.18);
            border-bottom: 1px solid rgba(255,255,255,0.12);
            box-shadow:
                4px 0 40px rgba(0,0,0,0.06),
                12px 0 80px rgba(0,0,0,0.08),
                inset 0 1.5px 3px rgba(255,255,255,0.90),
                inset 0 -1px 2px rgba(0,0,0,0.05);
            z-index: 2000;
            transition: left 0.65s var(--spring-out);
            display: flex;
            flex-direction: column;
            padding: 40px 20px;
            box-sizing: border-box;
        }

        body.dark .history-drawer {
            background:
                linear-gradient(
                    160deg,
                    rgba(255,255,255,0.18) 0%,
                    rgba(255,255,255,0.02) 38%,
                    rgba(120,140,255,0.04) 100%
                ),
                rgba(32, 32, 48, 0.42);
            backdrop-filter: blur(50px) saturate(180%) brightness(0.90);
            -webkit-backdrop-filter: blur(50px) saturate(180%) brightness(0.90);
            border-top-color:    rgba(255,255,255,0.20);
            border-left-color:   rgba(255,255,255,0.12);
            border-right-color:  rgba(255,255,255,0.05);
            border-bottom-color: rgba(255,255,255,0.04);
            box-shadow:
                4px 0 40px rgba(0,0,0,0.30),
                16px 0 80px rgba(0,0,0,0.25),
                inset 0 1.5px 3px rgba(255,255,255,0.18),
                inset 0 -1px 2px rgba(0,0,0,0.40);
        }

        .history-drawer.open {
            left: 20px;
        }

        .history-overlay {
            position: fixed;
            inset: 0;
            z-index: 1999;
            display: none;
        }

        .history-overlay.open {
            display: block;
        }

        .history-list {
            flex: 1;
            overflow-y: auto;
        }

        .history-item {
            position: relative;
            padding: 15px 15px 35px 15px;
            background: rgba(120, 120, 120, 0.1);
            border-radius: 16px;
            margin-bottom: 12px;
            cursor: pointer;
            transition: 0.3s;
        }

        .history-item.is-pinned {
            padding-left: 36px;
            border-left: 3px solid var(--siri-2);
        }

        .pin-icon {
            position: absolute;
            top: 16px;
            left: 12px;
            width: 14px;
            fill: var(--text-placeholder);
            display: none;
            transform: rotate(-45deg);
        }

        .history-item.is-pinned .pin-icon {
            display: block;
        }

        .item-menu-btn {
            position: absolute;
            bottom: 8px;
            right: 10px;
            width: 24px;
            height: 24px;
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 50%;
            transition: background 0.2s;
        }

        .item-menu-btn:hover {
            background: rgba(120, 120, 120, 0.2);
        }

        /* 4. 实体防遮挡菜单 */
        .item-action-menu {
            position: absolute;
            right: 10px;
            z-index: 100;
            min-width: 110px;
            background: var(--menu-bg);
            /* 实体色防止重叠 */
            border-radius: 12px;
            padding: 6px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            display: none;
            flex-direction: column;
        }

        .item-action-menu.show {
            display: flex;
            animation: menuPop 0.2s ease;
        }

        /* 智能弹出方向：第一项向下，其余向上 */
        .history-item:first-child .item-action-menu {
            top: 25px;
            bottom: auto;
        }

        .history-item:not(:first-child) .item-action-menu {
            bottom: 35px;
            top: auto;
        }

        .menu-action {
            padding: 8px 12px;
            font-size: 13px;
            border-radius: 6px;
            cursor: pointer;
            color: var(--text-main);
            transition: 0.2s;
        }

        .menu-action:hover {
            background: rgba(120, 120, 120, 0.15);
        }

        @keyframes menuPop {
            from {
                opacity: 0;
                transform: scale(0.95);
            }

            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        @keyframes organicWobble {

            0%,
            100% {
                border-radius: 50%;
            }

            33% {
                border-radius: 55% 45% 52% 48% / 48% 52% 45% 55%;
            }

            66% {
                border-radius: 48% 52% 46% 54% / 54% 46% 52% 48%;
            }
        }

        @keyframes coreChurn {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(180deg) scale(1.1); }
        }

        /* ---- Blob 浮动与变形动画 ---- */
        @keyframes blobFloat1 {
            0%   { transform: translate(0%, 0%) scale(1); }
            25%  { transform: translate(15%, 10%) scale(1.08); }
            50%  { transform: translate(8%, 20%) scale(0.95); }
            75%  { transform: translate(-5%, 8%) scale(1.05); }
            100% { transform: translate(10%, -10%) scale(1.02); }
        }
        @keyframes blobFloat2 {
            0%   { transform: translate(0%, 0%) scale(1); }
            30%  { transform: translate(-12%, -15%) scale(1.10); }
            60%  { transform: translate(-20%, -5%) scale(0.92); }
            100% { transform: translate(-8%, -18%) scale(1.04); }
        }
        @keyframes blobFloat3 {
            0%   { transform: translate(0%, 0%) scale(1); }
            40%  { transform: translate(-18%, 12%) scale(1.12); }
            80%  { transform: translate(-8%, 20%) scale(0.90); }
            100% { transform: translate(-15%, 5%) scale(1.06); }
        }
        @keyframes blobFloat4 {
            0%   { transform: translate(0%, 0%) scale(1); }
            35%  { transform: translate(20%, -10%) scale(1.15); }
            70%  { transform: translate(10%, -20%) scale(0.88); }
            100% { transform: translate(15%, -8%) scale(1.08); }
        }
        @keyframes blobMorph1 {
            0%, 100% { border-radius: 50%; }
            20%  { border-radius: 60% 40% 55% 45% / 45% 55% 40% 60%; }
            40%  { border-radius: 45% 55% 40% 60% / 60% 40% 55% 45%; }
            60%  { border-radius: 55% 45% 60% 40% / 40% 60% 45% 55%; }
            80%  { border-radius: 40% 60% 45% 55% / 55% 45% 60% 40%; }
        }
        @keyframes blobMorph2 {
            0%, 100% { border-radius: 50%; }
            25%  { border-radius: 65% 35% 50% 50% / 50% 50% 35% 65%; }
            50%  { border-radius: 40% 60% 65% 35% / 35% 65% 60% 40%; }
            75%  { border-radius: 50% 50% 35% 65% / 65% 35% 50% 50%; }
        }
        @keyframes blobMorph3 {
            0%, 100% { border-radius: 50%; }
            33%  { border-radius: 55% 45% 45% 55% / 60% 40% 60% 40%; }
            66%  { border-radius: 45% 55% 60% 40% / 40% 60% 45% 55%; }
        }
    </style>
</head>

        .auth-close:hover { color: var(--text-main); }

        /* 已登录时登录按钮出现绿点 */
        .login-toggle.logged-in::after {
            content: '';
            position: absolute; bottom: 8px; right: 8px;
            width: 8px; height: 8px;
            border-radius: 50%;
            background: #30d158;
            border: 1.5px solid var(--bg-color);
        }
        .login-toggle { position: relative; }
    </style>

    <script>
        /* =========================================
           AUTH — 注册 / 登录 / 登出
           ========================================= */
        let currentUser = null;
        let authMode = 'login'; // 'login' | 'register'

        // 页面加载时检查登录状态
        (async function checkSession() {
            try {
                const r = await fetch('/api/auth/me');
                if (r.ok) {
                    const d = await r.json();
                    currentUser = d.username;
                    onLoggedIn();
                }
            } catch(e) {}
        })();

        function openAuthModal() {
            if (currentUser) { openUserMenu(); return; }
            document.getElementById('auth-overlay').classList.add('show');
            document.getElementById('auth-modal').classList.add('show');
            setTimeout(() => document.getElementById('auth-username').focus(), 300);
        }
        function closeAuthModal() {
            document.getElementById('auth-overlay').classList.remove('show');
            document.getElementById('auth-modal').classList.remove('show');
            document.getElementById('auth-error').innerText = '';
        }
        function switchTab(mode) {
            authMode = mode;
            document.getElementById('tab-login').classList.toggle('active', mode === 'login');
            document.getElementById('tab-register').classList.toggle('active', mode === 'register');
            document.getElementById('auth-submit-btn').innerText = mode === 'login' ? '登录' : '注册';
            document.getElementById('auth-error').innerText = '';
        }
        async function submitAuth() {
            const u = document.getElementById('auth-username').value.trim();
            const p = document.getElementById('auth-password').value;
            const errEl = document.getElementById('auth-error');
            if (!u || !p) { errEl.innerText = '请填写用户名和密码'; return; }
            const btn = document.getElementById('auth-submit-btn');
            btn.innerText = '处理中…'; btn.disabled = true;
            try {
                const endpoint = authMode === 'login' ? '/api/auth/login' : '/api/auth/register';
                const r = await fetch(endpoint, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: u, password: p })
                });
                const d = await r.json();
                if (!r.ok) { errEl.innerText = d.detail || '操作失败'; }
                else {
                    currentUser = d.username;
                    onLoggedIn();
                    closeAuthModal();
                }
            } catch(e) { errEl.innerText = '网络错误，请重试'; }
            btn.innerText = authMode === 'login' ? '登录' : '注册';
            btn.disabled = false;
        }
        function onLoggedIn() {
            document.getElementById('login-btn').classList.add('logged-in');
            loadCloudHistory();
        }
        async function openUserMenu() {
            // 简单 confirm 登出
            if (confirm(`当前账号：${currentUser}\n点击确定登出`)) {
                await fetch('/api/auth/logout', { method: 'POST' });
                currentUser = null;
                document.getElementById('login-btn').classList.remove('logged-in');
                // 回退到本地存储
                historyData = JSON.parse(localStorage.getItem('scriptHistory')) || [];
                renderHistory();
            }
        }

        /* 云端历史记录同步 */
        async function loadCloudHistory() {
            try {
                const r = await fetch('/api/history');
                if (r.ok) {
                    const d = await r.json();
                    historyData = d.map(i => ({
                        id: i.id, timestamp: i.timestamp,
                        pinned: i.pinned||false, tags: i.tags, content: i.content
                    }));
                    renderHistory();
                }
            } catch(e) {}
        }

        /* =========================================
           CORE APP — unchanged logic below
           ========================================= */
        let abortController = null, fullScript = "";
        let historyData = JSON.parse(localStorage.getItem('scriptHistory')) || [];
        historyData = historyData.map(i => ({ id: i.id || Math.random().toString(36).substr(2, 9), timestamp: i.timestamp || Date.now(), pinned: i.pinned || false, tags: i.tags, content: i.content }));
        saveData();

        function toggleMode() {
            const b = document.body, i = document.getElementById('mode-icon');
            b.classList.toggle('dark');
            i.innerHTML = b.classList.contains('dark') ? '<circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>' : '<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" />';
        }

        function toggleDrawer() { document.getElementById('history-drawer').classList.toggle('open'); document.getElementById('history-overlay').classList.toggle('open'); }

        document.addEventListener('click', (e) => {
            if (!e.target.closest('.item-menu-btn')) document.querySelectorAll('.item-action-menu').forEach(m => m.classList.remove('show'));
        });

        // 回车提交 auth
        document.addEventListener('keydown', e => {
            if (e.key === 'Enter' && document.getElementById('auth-modal').classList.contains('show')) submitAuth();
            if (e.key === 'Escape' && document.getElementById('auth-modal').classList.contains('show')) closeAuthModal();
        });

        async function startGenerate() {
            if (document.body.classList.contains('is-generating')) return;
            ['era', 'location', 'identity', 'reversal'].forEach(id => {
                const v = document.getElementById(id).value || document.getElementById(id).placeholder.replace('例如：', '');
                document.getElementById(`pill-text-${id}`).innerText = v;
            });

            document.body.classList.add('is-generating');
            const content = document.getElementById('script-content'), wrapper = document.getElementById('script-wrapper');
            const cBtn = document.getElementById('cancel-btn'), rBtn = document.getElementById('return-btn'), scroll = document.getElementById('scroll-area');

            wrapper.style.transition = 'opacity 0.6s ease 0.4s'; wrapper.style.opacity = '1';
            cBtn.style.display = 'block'; rBtn.style.display = 'none';
            content.innerText = "时空链接中..."; fullScript = ""; abortController = new AbortController();

            try {
                const res = await fetch('/api/generate_script', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ era: document.getElementById('era').value, location: document.getElementById('location').value, identity: document.getElementById('identity').value, reversal: document.getElementById('reversal').value }), signal: abortController.signal });
                const reader = res.body.getReader(), decoder = new TextDecoder();
                content.innerText = "";
                let buffer = "";
                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;
                    buffer += decoder.decode(value, { stream: true });
                    const lines = buffer.split('\n'); buffer = lines.pop();
                    for (const line of lines) {
                        if (line.startsWith('data: ')) {
                            const dataStr = line.slice(6);
                            if (dataStr === '[DONE]') { finishGen(); break; }
                            try {
                                const parsed = JSON.parse(dataStr);
                                if (parsed.content) { fullScript += parsed.content; content.innerText = fullScript; scroll.scrollTop = scroll.scrollHeight; }
                            } catch (e) { }
                        }
                    }
                }
            } catch (e) { if (e.name === 'AbortError') content.innerText += "\n\n[ 已停止 ]"; finishGen(); }
        }

        function cancelGen(e) { e.stopPropagation(); if (abortController) abortController.abort(); }
        async function finishGen() {
            document.getElementById('cancel-btn').style.display = 'none';
            document.getElementById('return-btn').style.display = 'block';
            if (fullScript.length > 20) {
                const item = { tags: `${document.getElementById('era').value || '时代'}·${document.getElementById('identity').value || '身份'}`, content: fullScript };
                saveItem(item);
                // 如果已登录，同步到云端
                if (currentUser) {
                    try {
                        await fetch('/api/history', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify(item)
                        });
                    } catch(e) {}
                }
            }
        }

        function goBack(e) {
            e.stopPropagation();
            const wrapper = document.getElementById('script-wrapper');
            // 先淡出内容
            wrapper.style.transition = 'opacity 0.25s ease';
            wrapper.style.opacity = '0';
            setTimeout(() => {
                // spring 弹回：移除 is-generating 后 CSS transition 接管
                document.body.classList.remove('is-generating');
                // 延迟清空内容，等待 spring 动画完成
                setTimeout(() => {
                    document.getElementById('script-content').innerText = "";
                    wrapper.style.transition = '';
                    wrapper.style.opacity = '';
                }, 900);
            }, 220);
        }

        function saveData() {
            if (!currentUser) localStorage.setItem('scriptHistory', JSON.stringify(historyData));
            renderHistory();
        }
        function saveItem(item) { historyData.push({ id: Math.random().toString(36).substr(2, 9), timestamp: Date.now(), pinned: false, ...item }); saveData(); }

        function toggleMenu(e, id) { e.stopPropagation(); document.querySelectorAll('.item-action-menu').forEach(m => { if (m.id !== `menu-${id}`) m.classList.remove('show'); }); document.getElementById(`menu-${id}`).classList.toggle('show'); }
        function pinItem(e, id) { e.stopPropagation(); const i = historyData.find(x => x.id === id); if (i) i.pinned = !i.pinned; saveData(); }
        function deleteItem(e, id) { e.stopPropagation(); historyData = historyData.filter(x => x.id !== id); saveData(); }
        function copyText(e, id) { e.stopPropagation(); const i = historyData.find(x => x.id === id); navigator.clipboard.writeText(i.content); e.target.innerText = "已复制"; setTimeout(() => renderHistory(), 1000); }

        function renderHistory() {
            const list = document.getElementById('history-list'); list.innerHTML = '';
            const sorted = [...historyData].sort((a, b) => (b.pinned - a.pinned) || (b.timestamp - a.timestamp));
            sorted.forEach(item => {
                const div = document.createElement('div'); div.className = `history-item ${item.pinned ? 'is-pinned' : ''}`;
                div.innerHTML = `
                <svg class="pin-icon" viewBox="0 0 24 24"><path d="M16 12V4h1V2H7v2h1v8l-2 2v2h5.2v6h1.6v-6H18v-2l-2-2z"/></svg>
                <div class="tag">${item.tags}</div><div>${item.content.substring(0, 40)}...</div>
                <div class="item-menu-btn" onclick="toggleMenu(event, '${item.id}')"><svg viewBox="0 0 24 24"><path d="M6 10c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm12 0c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm-6 0c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2z"/></svg></div>
                <div class="item-action-menu" id="menu-${item.id}">
                    <div class="menu-action" onclick="pinItem(event, '${item.id}')">${item.pinned ? '取消置顶' : '置顶记忆'}</div>
                    <div class="menu-action" onclick="copyText(event, '${item.id}')">复制内容</div>
                    <div class="menu-action" onclick="deleteItem(event, '${item.id}')" style="color:#ff3b30">删除记忆</div>
                </div>
            `;
                div.onclick = (e) => { if (e.target.closest('.item-menu-btn') || e.target.closest('.item-action-menu')) return; toggleDrawer(); document.body.classList.add('is-generating'); const wrapper = document.getElementById('script-wrapper'); wrapper.style.transition = 'opacity 0.6s ease 0.4s'; wrapper.style.opacity = '1'; document.getElementById('script-content').innerText = item.content; document.getElementById('cancel-btn').style.display = 'none'; document.getElementById('return-btn').style.display = 'block'; };
                list.appendChild(div);
            });
        }
    </script>
</body>

</html>
