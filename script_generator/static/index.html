<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI剧本生成平台</title>
    <style>
        :root {
            --apple-font: "SF Pro Display", "SF Pro Text", -apple-system, sans-serif;
            --apple-bezier: cubic-bezier(0.23, 1, 0.32, 1);
            --return-bezier: cubic-bezier(0.4, 0.0, 0.2, 1);

            --bg-color: #f2f2f7;
            --title-color: rgba(60, 60, 67, 0.5);
            --text-main: #1d1d1f;
            --text-placeholder: rgba(60, 60, 67, 0.35);
            --glass-bg: rgba(255, 255, 255, 0.15);
            --glass-blur: blur(15px) saturate(180%);
            --glass-border: linear-gradient(135deg, rgba(255, 255, 255, 0.8), rgba(255, 255, 255, 0.1));

            /* 1. 仿真羊皮草纸质感 */
            --paper-bg: #f4f1ea;
            --paper-grain: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)' opacity='0.05'/%3E%3C/svg%3E");

            --siri-1: #4285f4;
            --siri-2: #9b72cb;
            --siri-3: #d96a9d;
            --siri-4: #feab3a;

            /* 滚动条与菜单实体色 */
            --scroll-thumb: rgba(0, 0, 0, 0.15);
            --menu-bg: #ffffff;
        }

        body.dark {
            --bg-color: #0d0d0f;
            --title-color: rgba(235, 235, 245, 0.5);
            --text-main: #f5f5f7;
            --text-placeholder: rgba(235, 235, 245, 0.65);
            --glass-bg: rgba(30, 30, 33, 0.35);
            --glass-border: linear-gradient(135deg, rgba(255, 255, 255, 0.2), rgba(255, 255, 255, 0.02));
            /* 夜间转为哑光黑卡纸 */
            --paper-bg: #1c1c1e;
            --scroll-thumb: rgba(255, 255, 255, 0.15);
            --menu-bg: #2c2c2e;
        }

        body.dark .bg-glow {
            opacity: 0.35;
            background:
                radial-gradient(circle at 15% 25%, rgba(70, 100, 200, 0.3) 0%, transparent 55%),
                radial-gradient(circle at 85% 15%, rgba(130, 80, 180, 0.3) 0%, transparent 55%),
                radial-gradient(circle at 50% 85%, rgba(100, 100, 180, 0.3) 0%, transparent 55%);
        }

        /* --- 2. 完美全圆角胶囊滚动条 --- */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: var(--scroll-thumb);
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: rgba(120, 120, 120, 0.4);
        }

        body {
            font-family: var(--apple-font);
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            background: var(--bg-color);
            color: var(--text-main);
            transition: background 0.8s var(--apple-bezier);
            -webkit-font-smoothing: antialiased;
        }

        .bg-glow {
            position: fixed;
            inset: -20%;
            z-index: -2;
            background:
                radial-gradient(circle at 15% 25%, rgba(195, 228, 255, 0.6) 0%, transparent 55%),
                radial-gradient(circle at 85% 15%, rgba(255, 213, 229, 0.5) 0%, transparent 55%),
                radial-gradient(circle at 50% 85%, rgba(226, 226, 255, 0.5) 0%, transparent 55%);
            filter: blur(100px);
            animation: liquidFlow 20s infinite alternate cubic-bezier(0.4, 0, 0.2, 1);
        }

        .bg-glass-overlay {
            position: fixed;
            inset: 0;
            z-index: -1;
            background: rgba(242, 242, 247, 0.3);
            backdrop-filter: blur(60px) saturate(140%);
            -webkit-backdrop-filter: blur(60px) saturate(140%);
            transition: all 0.8s var(--apple-bezier);
        }

        body.dark .bg-glass-overlay {
            background: rgba(14, 14, 16, 0.55);
            backdrop-filter: blur(80px) saturate(120%);
            -webkit-backdrop-filter: blur(80px) saturate(120%);
        }

        @keyframes liquidFlow {
            from {
                transform: scale(1);
            }

            to {
                transform: scale(1.1) rotate(3deg);
            }
        }

        .user-toggle,
        .mode-toggle,
        .history-toggle {
            position: fixed;
            width: 44px;
            height: 44px;
            border-radius: 14px;
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            cursor: pointer;
            z-index: 1000;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: all 0.4s var(--apple-bezier);
        }

        .user-toggle svg,
        .mode-toggle svg,
        .history-toggle svg {
            width: 22px;
            height: 22px;
            fill: var(--text-main);
        }

        body.dark .mode-toggle svg,
        body.dark .user-toggle svg {
            fill: none;
            stroke: var(--text-main);
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .user-toggle {
            top: 35px;
            right: 35px;
        }

        .mode-toggle {
            top: 95px;
            right: 35px;
        }

        .history-toggle {
            bottom: 35px;
            left: 35px;
        }

        /* --- 岛屿容器 --- */
        .islands-container {
            position: absolute;
            inset: 0;
            z-index: 10;
            pointer-events: none;
        }

        /* ---- iOS 26 Liquid Glass — Island ---- */
        .island {
            position: absolute;
            top: 50%;
            left: 50%;
            pointer-events: auto;
            translate: var(--tx) var(--ty);
            scale: var(--s, 1);
            transform: translateZ(0);
            backface-visibility: hidden;

            /* Multi-layer glass: specular film + body tint */
            background:
                linear-gradient(
                    155deg,
                    rgba(255,255,255,0.58) 0%,
                    rgba(255,255,255,0.10) 28%,
                    rgba(255,255,255,0.00) 58%,
                    rgba(210,220,255,0.07) 100%
                ),
                rgba(255,255,255,0.20);

            /* Deep blur + saturate for vivid refraction effect */
            backdrop-filter: blur(44px) saturate(220%) brightness(1.05);
            -webkit-backdrop-filter: blur(44px) saturate(220%) brightness(1.05);

            border-radius: 32px;
            overflow: hidden;

            /* Bright top/left edge = light-facing; dim bottom/right = shadow-facing (thickness illusion) */
            border-top: 1px solid rgba(255,255,255,0.80);
            border-left: 1px solid rgba(255,255,255,0.55);
            border-right: 1px solid rgba(255,255,255,0.20);
            border-bottom: 1px solid rgba(255,255,255,0.15);

            box-shadow:
                /* ambient drop shadow */
                0  4px  8px  rgba(0,0,0,0.04),
                0 14px 36px  rgba(0,0,0,0.08),
                0 28px 64px  rgba(0,0,0,0.04),
                /* water-tension outer ring */
                0  0   0 1px rgba(255,255,255,0.35),
                /* inner top specular */
                inset 0  2px  4px rgba(255,255,255,0.95),
                /* inner bottom dark rim (depth) */
                inset 0 -2px  4px rgba(0,0,0,0.07),
                /* lateral refraction */
                inset  2px 0  3px rgba(255,255,255,0.45),
                inset -2px 0  3px rgba(0,0,0,0.03);

            transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            will-change: transform, translate, scale, width, height, opacity, box-shadow;
            transform: translateZ(0);
            backface-visibility: hidden;
            cursor: text;
        }

        /* Curved top-gloss film */
        .island::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 44%;
            border-radius: 32px 32px 80% 80% / 32px 32px 28px 28px;
            background: linear-gradient(
                180deg,
                rgba(255,255,255,0.42) 0%,
                rgba(255,255,255,0.00) 100%
            );
            pointer-events: none;
            z-index: 5;
        }

        body.dark .island::before {
            display: none;
        }

        body.dark .island {
            background: rgba(36, 36, 52, 0.45);
            backdrop-filter: blur(44px) saturate(180%) brightness(0.92);
            -webkit-backdrop-filter: blur(44px) saturate(180%) brightness(0.92);
            border-top-color:   rgba(255,255,255,0.08);
            border-left-color:  rgba(255,255,255,0.05);
            border-right-color: rgba(255,255,255,0.02);
            border-bottom-color:rgba(255,255,255,0.02);
            box-shadow:
                0  6px 16px  rgba(0,0,0,0.30),
                0 20px 50px  rgba(0,0,0,0.28),
                0 36px 80px  rgba(0,0,0,0.18),
                0  0   0 1px rgba(255,255,255,0.05),
                inset 0  1px  2px rgba(255,255,255,0.08),
                inset 0 -2px  4px rgba(0,0,0,0.45);
        }

        .island-1 {
            --tx: calc(-100% - 70px);
            --ty: calc(-100% - 70px);
            width: 38vw;
            max-width: 440px;
            height: 22vh;
            max-height: 200px;
            padding: 30px 40px;
            box-sizing: border-box;
        }

        .island-2 {
            --tx: 70px;
            --ty: calc(-100% - 70px);
            width: 38vw;
            max-width: 440px;
            height: 22vh;
            max-height: 200px;
            padding: 30px 40px;
            box-sizing: border-box;
        }

        .island-3 {
            --tx: calc(-100% - 70px);
            --ty: 70px;
            width: 38vw;
            max-width: 440px;
            height: 22vh;
            max-height: 200px;
            padding: 30px 40px;
            box-sizing: border-box;
        }

        .island-4 {
            --tx: 70px;
            --ty: 70px;
            width: 38vw;
            max-width: 440px;
            height: 22vh;
            max-height: 200px;
            padding: 30px 40px;
            box-sizing: border-box;
        }

        .island:hover {
            --s: 1.03;
            box-shadow:
                0  6px 14px  rgba(0,0,0,0.06),
                0 20px 50px  rgba(0,0,0,0.10),
                0 38px 80px  rgba(0,0,0,0.05),
                0  0   0 1px rgba(255,255,255,0.50),
                0  0  24px 4px rgba(220,230,255,0.18),
                inset 0  2px  5px rgba(255,255,255,1.0),
                inset 0 -2px  4px rgba(0,0,0,0.09),
                inset  2px 0  3px rgba(255,255,255,0.55),
                inset -2px 0  3px rgba(0,0,0,0.04);
        }

        .island:focus-within {
            --s: 1.05;
            border-top-color: rgba(100,180,255,0.80);
            border-left-color: rgba(100,180,255,0.55);
            z-index: 20;
        }

        body:has(.island:focus-within) .island:not(:focus-within) {
            filter: blur(4px);
            opacity: 0.7;
        }

        body.is-hiding .island {
            scale: 0 !important;
            opacity: 0 !important;
            pointer-events: none !important;
            transition: scale 0.4s cubic-bezier(0.36, -0.24, 0.26, 0.8), opacity 0.3s ease !important;
        }

        body.is-emerging-center .island {
            transition: scale 0.5s cubic-bezier(0.34, 1.56, 0.64, 1), opacity 0.4s ease !important;
            transition-property: scale, opacity, box-shadow, border-color !important;
        }

        body.is-island-top .island {
            pointer-events: none;
            transition: scale 0.5s cubic-bezier(0.34, 1.56, 0.64, 1), opacity 0.4s ease !important;
            transition-property: scale, opacity, box-shadow, border-color !important;
        }

        body.is-island-top .island-1 {
            --tx: calc(-200% - 25px);
            --ty: calc(-50vh + 35px);
            width: 160px;
            height: 46px;
            border-radius: 23px;
            padding: 0 15px;
        }

        body.is-island-top .island-2 {
            --tx: calc(-100% - 8px);
            --ty: calc(-50vh + 35px);
            width: 160px;
            height: 46px;
            border-radius: 23px;
            padding: 0 15px;
        }

        body.is-island-top .island-3 {
            --tx: 8px;
            --ty: calc(-50vh + 35px);
            width: 160px;
            height: 46px;
            border-radius: 23px;
            padding: 0 15px;
        }

        body.is-island-top .island-4 {
            --tx: calc(100% + 25px);
            --ty: calc(-50vh + 35px);
            width: 160px;
            height: 46px;
            border-radius: 23px;
            padding: 0 15px;
        }

        .normal-view {
            display: flex;
            flex-direction: column;
            justify-content: center;
            height: 100%;
        }

        .pill-view {
            position: absolute;
            inset: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            opacity: 0;
            pointer-events: none;
        }

        .pill-view svg {
            width: 16px;
            height: 16px;
            flex-shrink: 0;
            fill: var(--title-color);
        }

        .pill-text {
            color: var(--text-main);
            font-size: 14px;
            font-weight: 500;
            font-family: var(--apple-font);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 100px;
        }

        body.is-island-top .normal-view {
            opacity: 0;
            pointer-events: none;
        }

        body.is-island-top .pill-view {
            opacity: 1;
        }

        .label-row {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 12px;
            opacity: 0.8;
            pointer-events: none;
        }

        .label-row label {
            font-size: 15px;
            font-weight: 700;
            color: var(--title-color);
            text-transform: uppercase;
        }

        .label-row svg {
            width: 20px;
            height: 20px;
            fill: var(--title-color);
        }

        input {
            background: transparent;
            border: none;
            font-size: 26px;
            font-weight: 500;
            color: var(--text-main);
            outline: none;
            width: 100%;
            font-family: var(--apple-font);
        }

        input::placeholder {
            color: var(--text-placeholder);
        }

        /* --- 生成容器 --- */
        .siri-sphere-center {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 50;
            width: 140px;
            height: 140px;
            max-width: 140px;
            max-height: 140px;
            min-width: 140px;
            min-height: 140px;
            transition: all 0.75s var(--return-bezier);
        }

        body.is-generating .siri-sphere-center {
            top: calc(50% + 30px);
            width: 88vw;
            height: 75vh;
            max-width: 1100px;
            max-height: 90vh;
            min-width: 320px;
            min-height: 480px;
            transition: all 0.85s var(--apple-bezier);
        }

        /* 展开后变为羊皮纸/黑卡纸 */
        body.is-generating .siri-sphere {
            border-radius: 40px;
            cursor: default;
            background-color: var(--paper-bg);
            background-image: var(--paper-grain);
            box-shadow: 0 30px 80px rgba(0, 0, 0, 0.15);
            border-top:    1px solid rgba(0,0,0,0.05);
            border-left:   1px solid rgba(0,0,0,0.05);
            border-right:  1px solid rgba(0,0,0,0.05);
            border-bottom: 1px solid rgba(0,0,0,0.05);
            backdrop-filter: none;
            -webkit-backdrop-filter: none;
            transition: width 0.85s var(--apple-bezier),
                        height 0.85s var(--apple-bezier),
                        border-radius 0.85s var(--apple-bezier),
                        background-color 0.85s var(--apple-bezier),
                        box-shadow 0.85s var(--apple-bezier),
                        border-color 0.85s var(--apple-bezier);
        }

        body.is-generating .siri-sphere::before,
        body.is-generating .siri-sphere::after,
        body.is-generating .siri-core,
        body.is-generating .sphere-shell {
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.85s var(--apple-bezier);
        }

        /* ---- iOS 26 Liquid Glass — Sphere ---- */
        .siri-sphere {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            position: relative;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: width 0.75s var(--return-bezier),
                        height 0.75s var(--return-bezier),
                        border-radius 0.75s var(--return-bezier),
                        background 0.75s var(--return-bezier),
                        box-shadow 0.75s var(--return-bezier),
                        border-color 0.75s var(--return-bezier),
                        transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            cursor: pointer;
            will-change: width, height, border-radius, box-shadow, transform;
            transform: translateZ(0);
            backface-visibility: hidden;

            /* Glass body: deep blur lets colour core show through */
            background:
                linear-gradient(
                    145deg,
                    rgba(255,255,255,0.62) 0%,
                    rgba(255,255,255,0.10) 38%,
                    rgba(200,215,255,0.06) 68%,
                    rgba(255,255,255,0.20) 100%
                ),
                rgba(255,255,255,0.18);
            backdrop-filter: blur(24px) saturate(240%) brightness(1.08);
            -webkit-backdrop-filter: blur(24px) saturate(240%) brightness(1.08);

            /* Asymmetric border = thickness illusion */
            border-top:    1.5px solid rgba(255,255,255,0.85);
            border-left:   1px   solid rgba(255,255,255,0.55);
            border-right:  1px   solid rgba(255,255,255,0.18);
            border-bottom: 1px   solid rgba(255,255,255,0.12);

            box-shadow:
                /* environment shadow */
                0  6px 16px  rgba(0,0,0,0.08),
                0 16px 40px  rgba(0,0,0,0.10),
                /* water-tension outer ring (bright halo) */
                0  0   0 1.5px rgba(255,255,255,0.38),
                0  0  30px 6px  rgba(190,215,255,0.20),
                /* inner specular */
                inset 0  2px  5px rgba(255,255,255,1.0),
                inset 0 -2px  5px rgba(0,0,0,0.10),
                /* subtle colour caustic */
                inset 5px -5px 20px rgba(160,190,255,0.14);
        }

        /* Curved top-gloss arc (convex lens highlight) */
        .siri-sphere::before {
            content: '';
            position: absolute;
            top: 7%;
            left: 18%;
            width: 64%;
            height: 30%;
            border-radius: 50%;
            background: radial-gradient(
                ellipse at 50% 10%,
                rgba(255,255,255,0.88) 0%,
                rgba(255,255,255,0.00) 100%
            );
            pointer-events: none;
            z-index: 10;
            filter: blur(1.5px);
            transition: opacity 0.75s var(--return-bezier);
        }

        /* Bottom caustic glow */
        .siri-sphere::after {
            content: '';
            position: absolute;
            bottom: 10%;
            left: 28%;
            width: 44%;
            height: 14%;
            border-radius: 50%;
            background: radial-gradient(
                ellipse,
                rgba(190,215,255,0.32) 0%,
                rgba(255,255,255,0.00) 100%
            );
            pointer-events: none;
            z-index: 10;
            filter: blur(4px);
            transition: opacity 0.75s var(--return-bezier);
        }

        body:not(.is-generating) .siri-sphere:hover {
            box-shadow:
                0  8px 22px  rgba(0,0,0,0.12),
                0 22px 55px  rgba(0,0,0,0.12),
                0  0   0 1.5px rgba(255,255,255,0.55),
                0  0  44px  10px rgba(190,215,255,0.28),
                inset 0  2px  5px rgba(255,255,255,1.0),
                inset 0 -2px  5px rgba(0,0,0,0.12),
                inset 5px -5px 24px rgba(160,190,255,0.18);
            transform: scale(1.05);
        }

        body:not(.is-generating) .siri-sphere:hover .siri-core {
            filter: blur(24px);
            opacity: 0.95;
            transform: scale(1.15);
        }



        body.dark .siri-sphere {
            background:
                linear-gradient(
                    145deg,
                    rgba(255,255,255,0.28) 0%,
                    rgba(255,255,255,0.04) 42%,
                    rgba(120,150,255,0.07) 72%,
                    rgba(255,255,255,0.10) 100%
                ),
                rgba(28, 28, 48, 0.32);
            backdrop-filter: blur(24px) saturate(200%) brightness(0.90);
            -webkit-backdrop-filter: blur(24px) saturate(200%) brightness(0.90);
            border-top-color:    rgba(255,255,255,0.30);
            border-left-color:   rgba(255,255,255,0.18);
            border-right-color:  rgba(255,255,255,0.07);
            border-bottom-color: rgba(255,255,255,0.05);
            box-shadow:
                0  8px 22px  rgba(0,0,0,0.40),
                0 20px 55px  rgba(0,0,0,0.35),
                0  0   0 1.5px rgba(255,255,255,0.12),
                0  0  30px 6px rgba(100,140,255,0.14),
                inset 0  2px  5px rgba(255,255,255,0.30),
                inset 0 -2px  5px rgba(0,0,0,0.50);
        }

        body.dark .btn-continue {
            background: rgba(10, 132, 255, 0.15);
            color: #0a84ff;
        }



        /* Colour core — visible through glass like a water drop over a painting */
        .sphere-shell {
            position: absolute;
            inset: 0;
            border-radius: 50%;
            z-index: 1;
            animation: organicWobble 10s infinite ease-in-out;
            transition: opacity 0.75s var(--return-bezier);
        }

        .siri-core {
            position: absolute;
            inset: 8%;
            border-radius: 50%;
            filter: blur(18px);
            opacity: 0.85;
            z-index: 2;
            background:
                radial-gradient(circle at 28% 30%, var(--siri-1) 0%, transparent 55%),
                radial-gradient(circle at 72% 28%, var(--siri-2) 0%, transparent 55%),
                radial-gradient(circle at 50% 80%, var(--siri-3) 0%, transparent 50%);
            animation: coreChurn 6s infinite alternate ease-in-out;
            transition: all 0.75s var(--return-bezier);
        }

        /* --- 剧本区 (分层退场) --- */
        .script-content-wrapper {
            position: absolute;
            inset: 0;
            z-index: 10;
            display: flex;
            flex-direction: column;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.6s ease 0.4s;
        }

        body.is-generating .script-content-wrapper {
            opacity: 1;
            pointer-events: auto;
        }

        .script-scroll-area {
            flex: 1;
            padding: 40px 50px 0;
            overflow-y: auto;
        }

        .script-text {
            line-height: 2.2;
            font-size: 21px;
            white-space: pre-wrap;
            color: var(--text-main);
            padding-bottom: 20px;
        }

        .action-bar {
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .action-btn {
            padding: 12px 28px;
            border-radius: 18px;
            border: 1px solid rgba(0, 0, 0, 0.1);
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.4s;
        }

        .btn-cancel {
            background: rgba(255, 59, 48, 0.1);
            color: #ff3b30;
            display: none;
        }

        .btn-return {
            background: rgba(0, 0, 0, 0.05);
            color: var(--text-main);
            display: none;
        }

        .btn-continue {
            background: rgba(0, 122, 255, 0.1);
            color: var(--apple-blue);
            display: none;
        }

        /* --- 记忆抽屉 --- */
        .history-drawer {
            position: fixed;
            top: 20px;
            bottom: 20px;
            left: -400px;
            width: 350px;
            /* iOS 26 Liquid Glass Background applied to drawer */
            background:
                linear-gradient(
                    145deg,
                    rgba(255,255,255,0.62) 0%,
                    rgba(255,255,255,0.10) 38%,
                    rgba(200,215,255,0.06) 68%,
                    rgba(255,255,255,0.20) 100%
                ),
                rgba(255,255,255,0.18);
            backdrop-filter: blur(34px) saturate(220%) brightness(1.05);
            -webkit-backdrop-filter: blur(34px) saturate(220%) brightness(1.05);

            border-top:    1.5px solid rgba(255,255,255,0.7);
            border-left:   1px   solid rgba(255,255,255,0.4);
            border-right:  1px   solid rgba(255,255,255,0.15);
            border-bottom: 1px   solid rgba(255,255,255,0.1);
            
            box-shadow:
                0 16px 40px rgba(0,0,0,0.08),
                0 0 0 1.5px rgba(255,255,255,0.2),
                inset 0 2px 4px rgba(255,255,255,0.8);

            border-radius: 28px;
            z-index: 2000;
            transition: left 0.8s var(--apple-bezier);
            display: flex;
            flex-direction: column;
            padding: 40px 20px;
            box-sizing: border-box;
        }

        body.dark .history-drawer {
            background:
                linear-gradient(
                    145deg,
                    rgba(255,255,255,0.18) 0%,
                    rgba(255,255,255,0.02) 42%,
                    rgba(120,150,255,0.04) 72%,
                    rgba(255,255,255,0.08) 100%
                ),
                rgba(28, 28, 48, 0.4);
            backdrop-filter: blur(34px) saturate(180%) brightness(0.95);
            -webkit-backdrop-filter: blur(34px) saturate(180%) brightness(0.95);
            border-top-color:    rgba(255,255,255,0.2);
            border-left-color:   rgba(255,255,255,0.1);
            border-right-color:  rgba(255,255,255,0.05);
            border-bottom-color: rgba(255,255,255,0.03);
            box-shadow:
                0 20px 55px rgba(0,0,0,0.35),
                0 0 0 1.5px rgba(255,255,255,0.08),
                inset 0 2px 5px rgba(255,255,255,0.2),
                inset 0 -2px 5px rgba(0,0,0,0.3);
        }

        .history-drawer.open {
            left: 20px;
        }

        .history-overlay {
            position: fixed;
            inset: 0;
            z-index: 1999;
            display: none;
        }

        .history-overlay.open {
            display: block;
        }

        .history-list {
            flex: 1;
            overflow-y: auto;
        }

        .history-item {
            position: relative;
            padding: 15px 15px 35px 15px;
            background: rgba(120, 120, 120, 0.1);
            border-radius: 16px;
            margin-bottom: 12px;
            cursor: pointer;
            transition: 0.3s;
        }

        .history-item.is-pinned {
            padding-left: 36px;
            border-left: 3px solid var(--siri-2);
        }

        .pin-icon {
            position: absolute;
            top: 16px;
            left: 12px;
            width: 14px;
            fill: var(--text-placeholder);
            display: none;
            transform: rotate(-45deg);
        }

        .history-item.is-pinned .pin-icon {
            display: block;
        }

        .item-menu-btn {
            position: absolute;
            bottom: 8px;
            right: 10px;
            width: 24px;
            height: 24px;
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 50%;
            transition: background 0.2s;
        }

        .item-menu-btn:hover {
            background: rgba(120, 120, 120, 0.2);
        }

        /* 4. 完全实体化防遮挡菜单 */
        .item-action-menu {
            position: absolute;
            right: 10px;
            z-index: 100;
            min-width: 110px;
            background: #e8e8ed; /* 完全不透明的高级灰白，不刺眼 */
            border: 1px solid rgba(0, 0, 0, 0.05);
            border-radius: 12px;
            padding: 6px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
            display: none;
            flex-direction: column;
        }

        body.dark .item-action-menu {
            background: #2c2c2e; /* 完全不透明的深灰 */
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
        }

        .item-action-menu.show {
            display: flex;
            animation: menuPop 0.2s ease;
        }

        /* 智能弹出方向：第一项向下，其余向上 */
        .history-item:first-child .item-action-menu {
            top: 25px;
            bottom: auto;
        }

        .history-item:not(:first-child) .item-action-menu {
            bottom: 35px;
            top: auto;
        }

        .menu-action {
            padding: 8px 12px;
            font-size: 13px;
            border-radius: 6px;
            cursor: pointer;
            color: var(--text-main);
            transition: 0.2s;
        }

        .menu-action:hover {
            background: rgba(120, 120, 120, 0.15);
        }

        @keyframes menuPop {
            from {
                opacity: 0;
                transform: scale(0.95);
            }

            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        @keyframes organicWobble {

            0%,
            100% {
                border-radius: 50%;
            }

            33% {
                border-radius: 55% 45% 52% 48% / 48% 52% 45% 55%;
            }

            66% {
                border-radius: 48% 52% 46% 54% / 54% 46% 52% 48%;
            }
        }

        @keyframes coreChurn {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(180deg) scale(1.1);
            }
        }
        /* Auth Modal */
        .auth-modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.4);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            z-index: 2999;
            opacity: 0;
            pointer-events: none;
            transition: 0.4s var(--apple-bezier);
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .auth-modal-overlay.open {
            opacity: 1;
            pointer-events: auto;
        }

        .auth-modal {
            width: 340px;
            padding: 30px;
            border-radius: 28px;
            background: rgba(255,255,255,0.2);
            backdrop-filter: blur(40px) saturate(200%);
            -webkit-backdrop-filter: blur(40px) saturate(200%);
            border: 1px solid rgba(255,255,255,0.4);
            box-shadow: 0 20px 60px rgba(0,0,0,0.15);
            text-align: center;
            transform: scale(0.9);
            transition: transform 0.4s var(--apple-bezier);
        }

        body.dark .auth-modal {
            background: rgba(40,40,50,0.3);
            border-color: rgba(255,255,255,0.1);
        }

        .auth-modal-overlay.open .auth-modal {
            transform: scale(1);
        }

        .auth-modal h3 {
            margin: 0 0 10px 0;
            font-size: 20px;
        }

        .auth-modal p {
            font-size: 14px;
            color: var(--text-placeholder);
            margin-bottom: 20px;
        }

        .auth-input {
            width: 100%;
            padding: 12px;
            margin-bottom: 12px;
            border-radius: 12px;
            border: none;
            background: rgba(255,255,255,0.4);
            color: var(--text-main);
            outline: none;
            box-sizing: border-box;
        }

        body.dark .auth-input {
            background: rgba(0,0,0,0.3);
        }

        .auth-btn {
            width: 100%;
            padding: 14px;
            border-radius: 14px;
            background: #0071e3;
            color: white;
            border: none;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 10px;
            transition: 0.2s;
        }

        .auth-btn:hover {
            background: #005bb5;
        }

        .close-auth {
            position: absolute;
            top: 15px;
            right: 15px;
            width: 24px;
            height: 24px;
            cursor: pointer;
            fill: var(--text-placeholder);
        }
    </style>
</head>

<body>

                            d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z" />

    <!-- Auth Modal -->
    <div class="auth-modal-overlay" id="auth-modal-overlay">
        <form class="auth-modal" onsubmit="event.preventDefault(); handleAuth();" autocomplete="on">
            <svg class="close-auth" viewBox="0 0 24 24" onclick="toggleAuthModal()">
                <path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/>
            </svg>
            <h3>账号登录</h3>
            <p>登录以保存和同步您的专属记忆</p>
            <input class="auth-input" id="auth-username" name="username" type="text" placeholder="手机号/邮箱" autocomplete="username">
            <input class="auth-input" id="auth-password" name="password" type="password" placeholder="密码" autocomplete="current-password">
            <button type="submit" class="auth-btn" id="auth-submit-btn">登录</button>
        </form>

    <script>
        let abortController = null, fullScript = "", currentScriptId = null;
        let historyData = JSON.parse(localStorage.getItem('scriptHistory')) || [];
        historyData = historyData.map(i => ({ id: i.id || Math.random().toString(36).substr(2, 9), timestamp: i.timestamp || Date.now(), pinned: i.pinned || false, tags: i.tags, content: i.content }));
        
        let authToken = localStorage.getItem('authToken');
        let authUser = localStorage.getItem('authUser');
        
        // Initial setup
        updateAuthUI();
        if (authToken) fetchRemoteScripts();
        else renderHistory();
        
        async function handleAuth() {
            const u = document.getElementById('auth-username').value;
            const p = document.getElementById('auth-password').value;
            if (!u || !p) return alert("请输入账号和密码");
            const btn = document.getElementById('auth-submit-btn');
            btn.innerText = "加载中...";
            try {
                const res = await fetch("/api/auth", {
                    method: "POST", headers:{"Content-Type":"application/json"},
                    body: JSON.stringify({username: u, password: p})
                });
                
                let data = null;
                try {
                    data = await res.json();
                } catch(e) {
                    alert("服务器状态异常 (" + res.status + " " + res.statusText + ")，可能正在重启同步，请稍侯重试。");
                    return;
                }
                
                if (!res.ok) {
                    const errorMsg = (data && data.error) ? data.error : ((data && data.detail) ? JSON.stringify(data.detail) : "请求失败");
                    alert(errorMsg);
                } else if (data && data.error) {
                    alert(data.error);
                } else if (data && data.token) {
                    authToken = data.token; authUser = data.username;
                    localStorage.setItem('authToken', authToken); localStorage.setItem('authUser', authUser);
                    toggleAuthModal(); updateAuthUI(); await fetchRemoteScripts();
                } else {
                    alert("未收到有效的登录凭证");
                }
            } catch(e) { 
                alert("网络连接中断，请检查您的网络设置\n" + e.message); 
            } finally {
                if (!authToken) btn.innerText = "登录";
            }
        }
        
        function updateAuthUI() {
            const icon = document.querySelector('.user-icon');
            if (authToken) {
                if(icon) icon.style.stroke = "var(--apple-blue)";
                const h3 = document.querySelector('.auth-modal h3'), p = document.querySelector('.auth-modal p');
                if(h3) h3.innerText = `欢迎! ${authUser}`;
                if(p) p.innerText = "您已登录，正在云端保存您的剧本记忆";
                document.getElementById('auth-username').style.display = 'none';
                document.getElementById('auth-password').style.display = 'none';
                const btn = document.getElementById('auth-submit-btn');
                btn.type = "button";
                btn.innerText = "退出登录";
                btn.onclick = () => {
                    authToken = null; authUser = null;
                    localStorage.removeItem('authToken'); localStorage.removeItem('authUser');
                    historyData = []; localStorage.setItem('scriptHistory', '[]'); renderHistory();
                    if(h3) h3.innerText = `账号登录`;
                    if(p) p.innerText = "登录以保存和同步您的专属记忆";
                    document.getElementById('auth-username').style.display = '';
                    document.getElementById('auth-username').value = '';
                    document.getElementById('auth-password').style.display = '';
                    document.getElementById('auth-password').value = '';
                    btn.type = "submit";
                    btn.innerText = "登录"; btn.onclick = null;
                    if(icon) icon.style.stroke = "var(--text-main)";
                    toggleAuthModal();
                };
            }
        }
        
        async function fetchRemoteScripts() {
            if (!authToken) return;
            try {
                const res = await fetch("/api/scripts", { headers: {"Authorization": `Bearer ${authToken}`} });
                const list = await res.json();
                if(!list.error) { historyData = list; localStorage.setItem('scriptHistory', JSON.stringify(historyData)); renderHistory(); }
            } catch(e) {}
        }
        
        async function syncRemoteScripts() {
            if (!authToken) return;
            try {
                await fetch("/api/scripts/sync", {
                    method: "POST", headers:{"Content-Type":"application/json", "Authorization": `Bearer ${authToken}`},
                    body: JSON.stringify({scripts: historyData})
                });
            } catch(e) {}
        }

        function toggleMode() {
            const b = document.body, i = document.getElementById('mode-icon');
            b.classList.toggle('dark');
            i.innerHTML = b.classList.contains('dark') ? '<circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>' : '<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" />';
        }

        function toggleDrawer() { document.getElementById('history-drawer').classList.toggle('open'); document.getElementById('history-overlay').classList.toggle('open'); }
        function toggleAuthModal() { document.getElementById('auth-modal-overlay').classList.toggle('open'); }

        document.addEventListener('click', (e) => {
            if (!e.target.closest('.item-menu-btn')) document.querySelectorAll('.item-action-menu').forEach(m => m.classList.remove('show'));
            if (e.target.id === 'auth-modal-overlay') toggleAuthModal();
        });

        async function startGenerate() {
            if (document.body.classList.contains('is-generating')) return;

            const RANDOM_ERAS = ["修仙乱世", "赛博朋克", "星际帝国", "末日废土", "大唐盛世", "蒸汽朋克", "深海纪元", "上古神话", "赛博武侠", "克苏鲁世界"];
            const RANDOM_LOCATIONS = ["地下黑市", "浮空要塞", "星际垃圾场", "皇家地牢", "废弃神庙", "第九疯人院", "巨物尸骸内部", "赛博贫民窟", "修仙外院", "深渊第一层"];
            const RANDOM_IDENTITIES = ["扫地杂役", "基因残缺者", "流放皇族", "废土拾荒客", "无名仵作", "落魄散修", "最后神明", "瞎眼盲仆", "报废仿生人", "守夜人"];
            const RANDOM_REVERSALS = ["随身吞噬系统", "左眼看穿生死", "附身亡灵禁卷", "异变治愈之血", "古神低语共生", "一键满级面板", "隐藏军火库", "斩断时间之剑", "终极BOSS转世", "无限时间回溯"];
            
            const randomDict = {
                'era': RANDOM_ERAS,
                'location': RANDOM_LOCATIONS,
                'identity': RANDOM_IDENTITIES,
                'reversal': RANDOM_REVERSALS
            };

            ['era', 'location', 'identity', 'reversal'].forEach(id => {
                const el = document.getElementById(id);
                let v = el.value.trim();
                if (!v) {
                    v = randomDict[id][Math.floor(Math.random() * randomDict[id].length)];
                }
                const textEl = document.getElementById(`pill-text-${id}`);
                textEl.innerText = v;
                textEl.style.color = 'var(--text-main)';
            });

            document.body.classList.add('is-hiding');
            document.body.classList.add('is-generating');
            const content = document.getElementById('script-content'), wrapper = document.getElementById('script-wrapper');
            const cBtn = document.getElementById('cancel-btn'), rBtn = document.getElementById('return-btn'), scroll = document.getElementById('scroll-area');

            wrapper.style.transition = 'opacity 0.6s ease'; wrapper.style.opacity = '1';
            cBtn.style.display = 'block'; rBtn.style.display = 'none'; document.getElementById('continue-btn').style.display = 'none';
            content.innerText = "时空链接中..."; fullScript = ""; currentScriptId = Math.random().toString(36).substr(2, 9); abortController = new AbortController();

            // Wait for sphere to fully expand before fetching and showing islands at the top
            await new Promise(r => setTimeout(r, 850));
            document.body.classList.add('is-island-top');
            document.body.classList.remove('is-hiding');

            try {
                const res = await fetch('/api/generate_script', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ era: document.getElementById('pill-text-era').innerText, location: document.getElementById('pill-text-location').innerText, identity: document.getElementById('pill-text-identity').innerText, reversal: document.getElementById('pill-text-reversal').innerText }), signal: abortController.signal });
                const reader = res.body.getReader(), decoder = new TextDecoder();
                content.innerText = "";
                let buffer = "";
                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;
                    buffer += decoder.decode(value, { stream: true });
                    const lines = buffer.split('\n'); buffer = lines.pop();
                    for (const line of lines) {
                        if (line.startsWith('data: ')) {
                            const dataStr = line.slice(6);
                            if (dataStr === '[DONE]') { finishGen(); break; }
                            try {
                                const parsed = JSON.parse(dataStr);
                                if (parsed.content) { fullScript += parsed.content; content.innerText = fullScript; scroll.scrollTop = scroll.scrollHeight; }
                            } catch (e) { }
                        }
                    }
                }
            } catch (e) { if (e.name === 'AbortError') content.innerText += "\n\n[ 已停止 ]"; finishGen(); }
        }

        function cancelGen(e) { e.stopPropagation(); if (abortController) abortController.abort(); }
        
        async function continueGen(e) {
            e.stopPropagation();
            if (document.getElementById('continue-btn').innerText === "时空链接中...") return;
            
            document.getElementById('cancel-btn').style.display = 'block'; 
            document.getElementById('return-btn').style.display = 'none'; 
            document.getElementById('continue-btn').style.display = 'none'; 
            
            abortController = new AbortController();
            const content = document.getElementById('script-content');
            const scroll = document.getElementById('scroll-area');
            
            if (!fullScript.endsWith('\n') && !fullScript.endsWith(']')) {
                fullScript += '\n\n';
                content.innerText = fullScript;
            }
            if (fullScript.endsWith('[ 已停止 ]')) {
                fullScript = fullScript.replace('\n\n[ 已停止 ]', '\n\n');
                content.innerText = fullScript;
            }
            
            try {
                const reqBody = {
                     era: document.getElementById('pill-text-era').innerText, 
                     location: document.getElementById('pill-text-location').innerText, 
                     identity: document.getElementById('pill-text-identity').innerText, 
                     reversal: document.getElementById('pill-text-reversal').innerText,
                     existing_content: fullScript
                };
                
                const res = await fetch('/api/generate_script', { 
                    method: 'POST', 
                    headers: { 'Content-Type': 'application/json' }, 
                    body: JSON.stringify(reqBody), 
                    signal: abortController.signal 
                });
                const reader = res.body.getReader(), decoder = new TextDecoder();
                let buffer = "";
                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;
                    buffer += decoder.decode(value, { stream: true });
                    const lines = buffer.split('\n'); buffer = lines.pop();
                    for (const line of lines) {
                        if (line.startsWith('data: ')) {
                            const dataStr = line.slice(6);
                            if (dataStr === '[DONE]') { finishGen(); break; }
                            try {
                                const parsed = JSON.parse(dataStr);
                                if (parsed.content) { fullScript += parsed.content; content.innerText = fullScript; scroll.scrollTop = scroll.scrollHeight; }
                            } catch (e) { }
                        }
                    }
                }
            } catch (e) { if (e.name === 'AbortError') content.innerText += "\n\n[ 已停止 ]"; finishGen(); }
        }

        function finishGen() { 
            document.getElementById('cancel-btn').style.display = 'none'; 
            document.getElementById('return-btn').style.display = 'block'; 
            document.getElementById('continue-btn').style.display = 'block'; 
            if (fullScript.length > 20) { 
                const tagsStr = ['era', 'location', 'identity', 'reversal'].map(id => document.getElementById(`pill-text-${id}`).innerText || '未知').join('·');
                
                let existing = historyData.find(x => x.id === currentScriptId);
                if (existing) {
                    existing.content = fullScript;
                    existing.timestamp = Date.now();
                    saveData();
                } else {
                    saveItem({ id: currentScriptId, tags: tagsStr, content: fullScript }); 
                }
            } 
        }

        function goBack(e) {
            e.stopPropagation();
            const wrapper = document.getElementById('script-wrapper');
            wrapper.style.transition = 'opacity 0.3s ease'; 
            wrapper.style.opacity = '0';
            
            ['era', 'location', 'identity', 'reversal'].forEach(id => {
                document.getElementById(id).value = '';
            });

            document.body.classList.add('is-hiding');
            document.body.classList.remove('is-generating');
            
            setTimeout(() => { 
                document.body.classList.remove('is-island-top');
                document.body.classList.remove('is-hiding');
                document.body.classList.add('is-emerging-center');
                
                document.getElementById('script-content').innerText = ""; 
                wrapper.style.transition = ''; 
                wrapper.style.opacity = ''; 
                
                setTimeout(() => document.body.classList.remove('is-emerging-center'), 550);
            }, 750);
        }

        function saveData() { localStorage.setItem('scriptHistory', JSON.stringify(historyData)); renderHistory(); syncRemoteScripts(); }
        function saveItem(item) { historyData.push({ id: item.id || Math.random().toString(36).substr(2, 9), timestamp: Date.now(), pinned: false, ...item }); saveData(); }

        function toggleMenu(e, id) { e.stopPropagation(); document.querySelectorAll('.item-action-menu').forEach(m => { if (m.id !== `menu-${id}`) m.classList.remove('show'); }); document.getElementById(`menu-${id}`).classList.toggle('show'); }
        function pinItem(e, id) { e.stopPropagation(); const i = historyData.find(x => x.id === id); if (i) i.pinned = !i.pinned; saveData(); }
        function deleteItem(e, id) { e.stopPropagation(); historyData = historyData.filter(x => x.id !== id); saveData(); }
        function copyText(e, id) { e.stopPropagation(); const i = historyData.find(x => x.id === id); navigator.clipboard.writeText(i.content); e.target.innerText = "已复制"; setTimeout(() => renderHistory(), 1000); }

        function renderHistory() {
            const list = document.getElementById('history-list'); list.innerHTML = '';
            const sorted = [...historyData].sort((a, b) => (b.pinned - a.pinned) || (b.timestamp - a.timestamp));
            sorted.forEach(item => {
                const div = document.createElement('div'); div.className = `history-item ${item.pinned ? 'is-pinned' : ''}`;
                div.innerHTML = `
                <svg class="pin-icon" viewBox="0 0 24 24"><path d="M16 12V4h1V2H7v2h1v8l-2 2v2h5.2v6h1.6v-6H18v-2l-2-2z"/></svg>
                <div class="tag">${item.tags}</div><div>${item.content.substring(0, 40)}...</div>
                <div class="item-menu-btn" onclick="toggleMenu(event, '${item.id}')"><svg viewBox="0 0 24 24"><path d="M6 10c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm12 0c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm-6 0c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2z"/></svg></div>
                <div class="item-action-menu" id="menu-${item.id}">
                    <div class="menu-action" onclick="pinItem(event, '${item.id}')">${item.pinned ? '取消置顶' : '置顶记忆'}</div>
                    <div class="menu-action" onclick="copyText(event, '${item.id}')">复制内容</div>
                    <div class="menu-action" onclick="deleteItem(event, '${item.id}')" style="color:#ff3b30">删除记忆</div>
                </div>
            `;
                div.onclick = async (e) => { 
                    if (e.target.closest('.item-menu-btn') || e.target.closest('.item-action-menu')) return; 
                    toggleDrawer(); 
                    
                    let tagParts = item.tags.split('·');
                    if (tagParts.length === 2) tagParts = [tagParts[0], '未知地点', tagParts[1], '未知反转'];
                    
                    ['era', 'location', 'identity', 'reversal'].forEach((id, idx) => {
                        const v = tagParts[idx] || '';
                        document.getElementById(`pill-text-${id}`).innerText = v;
                        document.getElementById(`pill-text-${id}`).style.color = 'var(--text-main)';
                    });

                    document.body.classList.add('is-hiding');
                    document.body.classList.add('is-generating'); 
                    
                    currentScriptId = item.id;
                    fullScript = item.content;
                    
                    const wrapper = document.getElementById('script-wrapper'); 
                    wrapper.style.transition = 'opacity 0.6s ease'; 
                    wrapper.style.opacity = '1'; 
                    document.getElementById('script-content').innerText = fullScript; 
                    document.getElementById('cancel-btn').style.display = 'none'; 
                    document.getElementById('return-btn').style.display = 'block'; 
                    document.getElementById('continue-btn').style.display = 'block'; 
                    
                    await new Promise(r => setTimeout(r, 850));
                    document.body.classList.add('is-island-top');
                    document.body.classList.remove('is-hiding');
                };
                list.appendChild(div);
            });
        }
    </script>
</body>

</html>
